<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/vite.svg"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>TruthEntity's Minecraft in 3.js</title>
    <link
      rel="stylesheet"
      href="/src/style.css"
    />
  </head>

  <body>
    <div id="app"></div>
    <div id="info">
      <div id="info-player-position"></div>
    </div>
    <div id="toolbar-container">
      <div id="toolbar">
        <img
          src="/icons/grass_block.png"
          class="toolbar-icon"
          id="toolbar-1"
        /><img
          src="/icons/dirt.png"
          class="toolbar-icon"
          id="toolbar-2"
        /><img
          src="/icons/stone.png"
          class="toolbar-icon"
          id="toolbar-3"
        /><img
          src="/icons/coal_ore.png"
          class="toolbar-icon"
          id="toolbar-4"
        /><img
          src="/icons/iron_ore.png"
          class="toolbar-icon"
          id="toolbar-5"
        /><img
          src="/icons/log.png"
          class="toolbar-icon"
          id="toolbar-6"
        /><img
          src="/icons/leaves.png"
          class="toolbar-icon"
          id="toolbar-7"
        /><img
          src="/icons/sand.png"
          class="toolbar-icon"
          id="toolbar-8"
        /><img
          src="/icons/pickaxe.png"
          class="toolbar-icon selected"
          id="toolbar-0"
        />
      </div>
    </div>
    <div id="overlay">
      <div id="instructions">
        <h1>MINECRAFTjs</h1>
        WASD - Move<br />
        SHIFT - Sprint<br />
        SPACE - Jump<br />
        R - Reset Camera<br />
        U - Toggle UI 0 - Pickaxe<br />
        1-8 - Select Block<br />
        F1 - Save Game<br />
        F2 - Load Game<br />
        F10 - Debug Camera<br /><br />
        <h2>PRESS ANY KEY TO START</h2>
      </div>
    </div>
    <div id="status"></div>
    <script
      type="module"
      src="/src/main.ts"
    ></script>
  </body>
</html>
